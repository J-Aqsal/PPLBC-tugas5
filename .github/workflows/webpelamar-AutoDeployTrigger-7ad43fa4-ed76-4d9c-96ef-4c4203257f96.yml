name: Trigger auto deployment for webpelamar

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/webpelamar-AutoDeployTrigger-7ad43fa4-ed76-4d9c-96ef-4c4203257f96.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.WEBPELAMAR_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.WEBPELAMAR_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.WEBPELAMAR_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: modul6kota109.azurecr.io
          registryUsername: ${{ secrets.WEBPELAMAR_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.WEBPELAMAR_REGISTRY_PASSWORD }}
          containerAppName: webpelamar
          resourceGroup: tugasCloud
          imageToBuild: modul6kota109.azurecr.io/webpelamar:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


