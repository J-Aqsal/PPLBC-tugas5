<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Pendaftaran Pegawai</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 12px;
            font-size: 16px;
        }

        button {
            padding: 12px;
            border: none;
            background: #0078d4;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            opacity: 0.9;
        }

        .message {
            margin-top: 20px;
            text-align: center;
            color: green;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Portal Pendaftaran Pegawai PT.BTA</h1>

        <form
            action="/submit"
            method="POST"
            enctype="multipart/form-data"
        >
            <input
                type="text"
                name="nama"
                placeholder="Nama Lengkap"
                required
            />

            <input
                type="email"
                name="email"
                placeholder="Alamat Email"
                required
            />

            <input
                type="file"
                name="gambar"
                accept="image/*"
                required
            />

            <button type="submit">
                Submit
            </button>
        </form>

        <!-- {% if message %}
            <div class="message">
                {{ message }}
            </div>
        {% endif %} -->
    </div>

</body>
</html>
